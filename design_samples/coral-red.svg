  <text x="444" y="589" fill="#FFF5F5" font-family="Segoe UI, Arial" font-size="24" font-weight="700">Process queue</text>
  <rect x="742" y="392" width="524" height="182" rx="26" fill="#241C28" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="780" y="446" fill="#FFFFFF" font-family="Segoe UI, Arial" font-size="30" font-weight="700">Button / Hover sample</text>
