<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="60" x2="1260" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16111C"/>
      <stop offset="0.55" stop-color="#201726"/>
      <stop offset="1" stop-color="#2A1D2E"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 150) rotate(35) scale(300 220)">
      <stop stop-color="#FF7A6B" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FF7A6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1170 140) rotate(155) scale(260 210)">
      <stop stop-color="#FF4D6D" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FF4D6D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A6B"/>
      <stop offset="1" stop-color="#FF4D6D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020814" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#glowA)"/>
  <rect width="1400" height="900" fill="url(#glowB)"/>
  <text x="88" y="96" fill="#FFFFFF" font-family="Segoe UI, Arial" font-size="42" font-weight="700">Coral Red</text>
  <text x="88" y="132" fill="#FFD6D0" font-family="Segoe UI, Arial" font-size="20">Bold identity with warm coral accents and a stronger visual signature</text>
  <g filter="url(#shadow)">
    <rect x="82" y="174" width="1236" height="628" rx="36" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1"/>
  </g>
  <text x="126" y="242" fill="#FF9E8D" font-family="Segoe UI, Arial" font-size="18" letter-spacing="4">UPLOAD AREA</text>
  <text x="126" y="292" fill="#FFF4F2" font-family="Segoe UI, Arial" font-size="54" font-weight="700">Bold and Memorable Accent Style</text>
  <text x="126" y="336" fill="#D9C8CD" font-family="Segoe UI, Arial" font-size="22">Best if you want the interface to feel different from the usual blue academic dashboards.</text>
  <rect x="126" y="392" width="560" height="260" rx="28" fill="#241C28" stroke="#FF7A6B" stroke-opacity="0.22" stroke-dasharray="10 10"/>
  <text x="166" y="462" fill="#FFFFFF" font-family="Segoe UI, Arial" font-size="34" font-weight="700">Drop files here</text>
  <text x="166" y="506" fill="#D7C4C9" font-family="Segoe UI, Arial" font-size="21">Coral gives your action states stronger personality while still feeling premium.</text>
  <rect x="166" y="548" width="214" height="64" rx="18" fill="url(#primary)"/>
  <text x="223" y="589" fill="#241116" font-family="Segoe UI, Arial" font-size="24" font-weight="700">Add file</text>
